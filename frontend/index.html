<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoSpark – Gamified Environmental Education</title>

<!-- ================= PREMIUM GOOGLE FONT ================= -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================================================
   ROOT VARIABLES (Dark + Light Mode)
========================================================= */
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ffae;
  --green2:#00ffa2;
  --accent:linear-gradient(45deg,#00ffae,#00e5ff);
}

body.light{
  --bg:#f5f7fa;
  --card:rgba(0,0,0,0.05);
  --text:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:0.4s ease;
}

/* =========================================================
   FLOATING PARTICLES BACKGROUND
========================================================= */
canvas#particles{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* =========================================================
   GLOBAL UI
========================================================= */
section{
  padding:60px 8%;
}

h2{
  font-size:2rem;
  margin-bottom:20px;
}

button{
  padding:10px 20px;
  border:none;
  cursor:pointer;
  border-radius:30px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  box-shadow:0 0 20px var(--green);
  transform:translateY(-2px);
}

.card{
  background:var(--card);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  margin:15px 0;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(0,255,174,0.4);
}

/* =========================================================
   HEADER
========================================================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
  position:sticky;
  top:0;
  backdrop-filter:blur(20px);
}

.logo{
  font-weight:700;
  font-size:1.5rem;
  background:var(--accent);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* =========================================================
   AUTH SECTION
========================================================= */
.auth-container{
  max-width:400px;
  margin:auto;
}

.input-group{
  position:relative;
  margin:20px 0;
}

.input-group input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

.input-group label{
  position:absolute;
  left:15px;
  top:12px;
  transition:0.3s;
  pointer-events:none;
  color:#888;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
  top:-10px;
  left:10px;
  font-size:12px;
  color:var(--green);
}

/* =========================================================
   PROGRESS BAR
========================================================= */
.progress{
  width:100%;
  height:15px;
  background:#333;
  border-radius:20px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:0.5s;
}

/* =========================================================
   LEADERBOARD
========================================================= */
.leader-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:8px 0;
  border-radius:12px;
  transition:0.4s;
}

.leader-item.top1{background:gold;color:#000;}
.leader-item.top2{background:silver;color:#000;}
.leader-item.top3{background:#cd7f32;color:#000;}

/* =========================================================
   QUIZ
========================================================= */
.quiz-option{
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.quiz-option:hover{
  background:var(--accent);
  color:#000;
}

/* =========================================================
   RESPONSIVE
========================================================= */
@media(max-width:768px){
  section{padding:40px 5%;}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
  <div class="logo">EcoQuest</div>
  <button onclick="toggleMode()">Toggle Mode</button>
</header>

<!-- =======================================================
   AUTH SECTION
======================================================= -->
<section id="loginSection">
  <div class="auth-container card">
    <h2>Login</h2>
    <div class="input-group">
      <input type="text" id="username" placeholder=" " required>
      <label>Username</label>
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder=" " required>
      <label>Password</label>
    </div>
    <button onclick="login()">Enter EcoQuest</button>
  <div id="mainApp" style="display:none;">
</section>
</div>
<!-- =======================================================
   DASHBOARD
======================================================= -->
<section>
<h2>Gamification Dashboard</h2>
<div class="card">
  <h3>Eco Points: <span id="points">0</span></h3>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <br>
  <button onclick="addPoints(20)">Complete Mission (+20)</button>
</div>
</section>

<!-- =======================================================
   LEADERBOARD
======================================================= -->
<section>
<h2>Leaderboard</h2>
<div class="card">
  <input type="text" id="leaderName" placeholder="Name">
  <input type="number" id="leaderPoints" placeholder="Points">
  <button onclick="addLeader()">Add</button>
  <div id="leaderboard"></div>
</div>
</section>

<!-- =======================================================
   CARBON CALCULATOR
======================================================= -->
<section>
<h2>Carbon Footprint Calculator</h2>
<div class="card">
  <input type="number" id="electricity" placeholder="Electricity kWh">
  <input type="number" id="vehicle" placeholder="Vehicle km">
  <button onclick="calculateCarbon()">Calculate</button>
  <h3 id="carbonResult"></h3>
  <div class="progress"><div class="progress-fill" id="carbonBar"></div></div>
</div>
</section>

<!-- =======================================================
   AI PHOTO VERIFY
======================================================= -->
<section>
<h2>AI Mission Verification</h2>
<div class="card">
  <input type="file" id="photoInput">
  <br><br>
  <img id="preview" width="100%">
  <br><br>
  <button onclick="verifyPhoto()">Verify</button>
  <h3 id="verifyStatus"></h3>
</div>
</section>

<!-- =======================================================
   GEOLOCATION
======================================================= -->
<section>
<h2>Geo Tag Mission</h2>
<div class="card">
  <button onclick="getLocation()">Get Location</button>
  <p id="location"></p>
</div>
</section>

<!-- =======================================================
   QUIZ
======================================================= -->
<section>
<h2>Eco Quiz</h2>
<div class="card" id="quiz"></div>
</section>

<!-- =======================================================
   SCHOOL COMPETITION
======================================================= -->
<section>
<h2>School vs School</h2>
<div class="card">
  <div id="schoolBoard"></div>
</div>
</section>

<!-- =======================================================
   ADMIN DASHBOARD
======================================================= -->
<section>
<h2>Admin Analytics</h2>
<div class="card">
  <p>Total Students: <span id="totalStudents">120</span></p>
  <p>Total Eco Points: <span id="totalEcoPoints">4500</span></p>
  <p>CO2 Reduced: <span id="totalCO2">1200kg</span></p>
  <canvas id="chart" height="100"></canvas>
</div>
</section>

<script>

/* ================= PARTICLES ================= */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2});
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ffae";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
    ctx.fill();
    p.y+=0.5;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(animate);
}
animate();

/* ================= DARK MODE ================= */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* ================= AUTH ================= */
function login(){
  alert("Welcome to EcoQuest!");
}

/* ================= GAMIFICATION ================= */
let ecoPoints=0;
function addPoints(val){
  ecoPoints+=val;
  document.getElementById("points").innerText=ecoPoints;
  document.getElementById("progressFill").style.width=ecoPoints+"%";
  confetti();
}

/* ================= CONFETTI ================= */
function confetti(){
  for(let i=0;i<30;i++){
    let div=document.createElement("div");
    div.style.position="fixed";
    div.style.width="8px";
    div.style.height="8px";
    div.style.background="var(--green)";
    div.style.top="0px";
    div.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(div);
    let fall=setInterval(()=>{
      div.style.top=parseInt(div.style.top)+5+"px";
      if(parseInt(div.style.top)>window.innerHeight){
        clearInterval(fall);
        div.remove();
      }
    },20);
  }
}




/* ================= LEADERBOARD ================= */
let leaders=[];
function addLeader(){
  let name=document.getElementById("leaderName").value;
  let pts=parseInt(document.getElementById("leaderPoints").value);
  leaders.push({name,pts});
  leaders.sort((a,b)=>b.pts-a.pts);
  renderLeaders();
}
function renderLeaders(){
  let board=document.getElementById("leaderboard");
  board.innerHTML="";
  leaders.forEach((l,i)=>{
    let div=document.createElement("div");
    div.className="leader-item";
    if(i==0)div.classList.add("top1");
    if(i==1)div.classList.add("top2");
    if(i==2)div.classList.add("top3");
    div.innerHTML=`${i+1}. ${l.name} <span>${l.pts}</span>`;
    board.appendChild(div);
  });
}

/* ================= CARBON ================= */
function calculateCarbon(){
  let e=document.getElementById("electricity").value*0.82;
  let v=document.getElementById("vehicle").value*0.21;
  let total=(e+v).toFixed(2);
  document.getElementById("carbonResult").innerText="CO2: "+total+" kg";
  document.getElementById("carbonBar").style.width=Math.min(total,100)+"%";
}

/* ================= PHOTO VERIFY ================= */
document.getElementById("photoInput").addEventListener("change",function(e){
  const reader=new FileReader();
  reader.onload=function(){
    document.getElementById("preview").src=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});
function verifyPhoto(){
  let status=document.getElementById("verifyStatus");
  status.innerText="AI Verifying...";
  setTimeout(()=>{status.innerText="✅ Verified! Eco Points Awarded";addPoints(30);},2000);
}

/* ================= GEO ================= */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("location").innerText=
    "Lat: "+pos.coords.latitude+" , Lon: "+pos.coords.longitude;
  });
}

/* ================= QUIZ ================= */
let quizData=[
{q:"Which gas causes global warming?",a:["Oxygen","CO2","Nitrogen"],c:1},
{q:"Best renewable energy?",a:["Coal","Solar","Diesel"],c:1},
{q:"Reduce plastic by?",a:["Reuse bags","Burn plastic","Throw rivers"],c:0}
];
let quizDiv=document.getElementById("quiz");
quizData.forEach((item,i)=>{
  let q=document.createElement("div");
  q.innerHTML="<p>"+item.q+"</p>";
  item.a.forEach((opt,j)=>{
    let o=document.createElement("div");
    o.className="quiz-option";
    o.innerText=opt;
    o.onclick=function(){
      if(j==item.c){o.style.background="green";addPoints(10);}
      else{o.style.background="red";}
    }
    q.appendChild(o);
  });
  quizDiv.appendChild(q);
});

/* ================= SCHOOL BOARD ================= */
let schools=[
{name:"Green Valley",pts:400},
{name:"Eco Public",pts:350},
{name:"Sunrise School",pts:500}
];
schools.sort((a,b)=>b.pts-a.pts);
let sb=document.getElementById("schoolBoard");
schools.forEach((s,i)=>{
  let div=document.createElement("div");
  div.className="leader-item";
  div.innerHTML=`${i+1}. ${s.name} <span>${s.pts}</span>`;
  sb.appendChild(div);
});

/* ================= ADMIN CHART ================= */
let chart=document.getElementById("chart");
let c=chart.getContext("2d");
let data=[50,80,60,90,70];
data.forEach((val,i)=>{
  c.fillStyle="#00ffae";
  c.fillRect(i*60+20,100-val,40,val);
});

</script>
<script src="script.js"></script>
</body>
</html>
